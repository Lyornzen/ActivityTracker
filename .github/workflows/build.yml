name: Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Test & Publish (win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ActivityTracker.sln

      - name: Build (Release)
        run: dotnet build ActivityTracker.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test ActivityTracker.sln -c Release --no-build --verbosity normal

      - name: Publish (single-file framework-dependent)
        run: >
          dotnet publish src/ActivityTracker.UI/ActivityTracker.UI.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/win-x64
          --no-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivityTracker-win-x64
          path: publish/win-x64/
          if-no-files-found: error
